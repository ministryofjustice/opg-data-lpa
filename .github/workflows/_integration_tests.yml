permissions:
  actions: read
  checks: read
  contents: read
  deployments: none
  id-token: write
  issues: none
  packages: none
  pull-requests: none
  repository-projects: none
  security-events: write
  statuses: none

on:
  workflow_call:
    inputs:
      data_lpa_api_url:
        description: 'The url of the data lpa api gateway'
        required: true
        type: string
      oidc_role:
        description: "The OIDC role to assume for AWS access"
        required: true
        type: string
      working_directory:
        description: 'Working Directory to run tests from'
        required: true
        type: string
      tests_directory:
        description: 'Directory containing Pytest tests'
        required: true
        type: string
      specific_tests:
        description: 'File path to specific Pytest tests - currently used to run 1 test as a smoke test'
        required: false
        type: string
        default: ""

jobs:
  integration_tests:
    name: Run integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          aws-region: eu-west-1
          role-to-assume: ${{ inputs.oidc_role }}
          role-duration-seconds: 3600
          role-session-name: oidc-opg-data-lpa-test-runner-github-action

      - name: install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.11.24"
          python-version: "3.14.6"

      - name: Install dependencies
        run: uv sync --locked --project "${{ inputs.tests_directory }}"

      - name: Run tests with Pytest
        env:
          DATA_LPA_API_URL: ${{ inputs.data_lpa_api_url }}
          SPECIFIC_TESTS: ${{ inputs.specific_tests}}
        working-directory: ${{ inputs.working_directory }}
        run: uv run --project "${{ inputs.tests_directory }}" coverage run -m pytest $SPECIFIC_TESTS -v -s

      - name: Generate Coverage Report
        working-directory: ${{ inputs.working_directory }}
        run: uv run --project "${{ inputs.tests_directory }}" coverage report -m
