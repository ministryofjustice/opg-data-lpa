name: "[Job] Destroy Environment"

on:
  workflow_call:
    inputs:
      workspace_name:
        description: "The terraform workspace to target for environment actions"
        required: true
        type: string
    secrets:
      allowlist_deploy_key:
        description: "SSH Deploy Key"
        required: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Error if protected
        if: ${{ contains(fromJSON('["development", "preproduction", "production", "demo", "integration"]'), inputs.workspace_name) }}
        run: |
          echo "Cannot destroy protected Environment"
          exit 1

  terraform_environment_workflow:
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    needs: check
    env:
      tf_dir: "./terraform/environment"
      TF_VAR_default_role: ${{ vars.DEVELOPMENT_ROLE }}
      TF_VAR_management_role: ${{ vars.MANAGEMENT_ROLE }}
      TF_VAR_lambda_image_uri: "311462405659.dkr.ecr.eu-west-1.amazonaws.com/integrations/lpa-data-lambda:latest"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: "0"
      - name: "Parse terraform version [directory: ${{ env.tf_dir }}]"
        id: tf_version
        uses: ministryofjustice/opg-github-actions/actions/terraform-version@b605e1e2c94b399e8139c4c2be2c8730700e0004 # v4.5.2
        with:
          terraform_directory: ${{ env.tf_dir }}
      - name: "Terraform version [${{ steps.tf_version.outputs.version }}]"
        run: echo "terraform version [${{ steps.tf_version.outputs.version }}]" >> $GITHUB_STEP_SUMMARY
        working-directory: ${{ env.tf_dir }}
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ steps.tf_version.outputs.version }}
          terraform_wrapper: false
      - name: Configure AWS Credentials For Terraform
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          aws-region: eu-west-1
          role-to-assume: ${{ vars.OIDC_PULL_REQUEST_ROLE }}
          role-duration-seconds: 3600
          role-session-name: oidc-opg-data-lpa-destory-environment-github-action
      - uses: ministryofjustice/opg-github-actions/actions/github-deploy-key@ceeda9d30ec7f6705c819d0b7664b9a79df99a3b # v4.8.0
        with:
          deploy_key: ${{ secrets.allowlist_deploy_key }}
      
      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.tf_dir }}

      - name: Terraform Destroy
        env:
          WORKSPACE_NAME: ${{ inputs.workspace_name }}
        run: |
          terraform workspace select $WORKSPACE_NAME
          terraform destroy -auto-approve
          terraform workspace select default
          terraform workspace delete $WORKSPACE_NAME
        working-directory: ${{ env.tf_dir }}
